---
layout: default
title: Blog
---

<section id="blog">
    <h2>Blog Posts</h2>
    
    <div class="posts">
        {% for post in site.posts %}
        <div class="post-item">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            <div class="post-date">{{ post.date | date: "%B %d, %Y" }}</div>
            <p>{{ post.excerpt }}</p>
        </div>
        {% endfor %}
    </div>
</section>

{% include footer.html %}
