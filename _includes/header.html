    <div class="contact-info">
        <span>
            <a href="https://maps.app.goo.gl/cGp4ssQzspJaF3fB6" target="_blank" class="geo-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="contact-icon"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>Tacloban City, PH
            </a>
        </span> |
        <a href="/about/#connection" class="connect-link">Connect with me</a>
    </div>
</header>

<script>
    function revealContact(el) {
        const val = atob(el.getAttribute('data-v'));
        const type = el.getAttribute('data-t');
        const link = document.createElement('a');
        link.href = `${type}:${val}`;
        link.textContent = val;
        link.className = 'revealed contact-link';
        el.parentNode.replaceChild(link, el);
    }
</script>
