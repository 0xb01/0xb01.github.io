<!-- Contact Section -->
<section class="section contact-page-section hidden" id="contactPageSection">
    <div class="contact-header">
        <div class="contact-header-content">
            <h2 class="contact-headline">Let's Work Together</h2>
            <p class="contact-subheadline">Have a project in mind? Fill out the form below and I'll get back to you within 24-48 hours.</p>
        </div>
        <div class="contact-header-icon">
            <i class="fas fa-paper-plane"></i>
        </div>
    </div>

    <!-- Note Box -->
    <div class="contact-note">
        <div class="contact-note-content">
            {{ site.data.profile.contact_form.note_content | markdownify }}
            <p class="contact-note-signature">— {{ site.data.profile.contact_form.note_signature }}</p>
        </div>
    </div>

    <div class="contact-form-wrapper">
        <form class="contact-form" id="contactForm" action="{{ site.data.profile.contact_form.formspree_url }}" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="contactSubjectSelect">Subject</label>
                <select id="contactSubjectSelect" name="subject" required onchange="handleSubjectChange()">
                    <option value="">Select a subject</option>
                    <option value="project">Project Inquiry</option>
                    <option value="collaboration">Collaboration</option>
                    <option value="job">Job Opportunity</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group subject-custom-wrapper">
                <label for="contactSubject">Custom Subject</label>
                <input type="text" id="contactSubject" name="subject_custom" class="subject-custom-input" placeholder="Enter your subject">
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="Tell me about your project, timeline, and budget..." rows="6"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i>
                <span>Send Message</span>
            </button>
        </form>
    </div>
</section>
