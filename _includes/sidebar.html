<!-- Column 1: Personal Info -->
<aside class="column column-1">
    <div class="profile-section">
        <div class="profile-left">
            <div class="profile-image">
                <img src="/res/me.jpg" alt="John Nichols Ranara" class="profile-photo">
            </div>
            <div class="profile-text">
                <h1 class="name">John Nichols Ranara</h1>
                <div class="location-info">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Tacloban City, Leyte</span>
                </div>
                <div class="status-box">
                    <i class="fas fa-circle" style="font-size: 6px; color: var(--accent-color); margin-right: 6px;"></i>
                    Open to opportunities
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <hr class="separator">
            <button class="nav-btn active" id="homeBtn" onclick="showHome()">Home</button>
            <button class="nav-btn" id="workExpBtn" onclick="showWorkExperience()">Work Experience</button>
            <button class="nav-btn" id="blogBtn" onclick="showBlog()">Blog</button>
            <button class="nav-btn" id="contactBtn" onclick="showContact()">Contact</button>
            <button class="nav-btn" id="resumeBtn" onclick="showResume()">Resume</button>
        </div>
    </div>

    <div class="contact-section" style="margin-top: auto; padding-top: 15px; padding-bottom: 10px;">
        <h3>Contact</h3>
        <ul class="contact-list">
            <li>
                <i class="fas fa-envelope"></i>
                <a href="javascript:void(0)" onclick="showContact(); return false;">{{ site.my_email }}</a>
            </li>
            <li>
                <i class="fas fa-phone"></i>
                <a href="javascript:void(0)" onclick="showContact(); return false;">{{ site.my_phone }}</a>
            </li>
            <li class="timezone-contact" onclick="showContact()">
                <i class="fas fa-clock"></i>
                <span id="timezoneText">Loading...</span>
            </li>
        </ul>
    </div>

    <div class="social-section">
        <h3>Socials</h3>
        <div class="social-links">
            <a href="{{ site.my_github }}" class="social-link" aria-label="GitHub" target="_blank">
                <i class="fab fa-github"></i>
            </a>
            <a href="{{ site.my_linkedin }}" class="social-link" aria-label="LinkedIn" target="_blank">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <!--
            <a href="{{ site.my_facebook }}" class="social-link" aria-label="Facebook" target="_blank">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="{{ site.my_twitter }}" class="social-link" aria-label="Twitter" target="_blank">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="{{ site.my_instagram }}" class="social-link" aria-label="Instagram" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            -->
            <a href="{{ site.my_youtube }}" class="social-link" aria-label="YouTube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </div>
</aside>
