title: JNR
email: banikaz@proton.me
description: >-
  Solution-oriented programmer with 10 years of experience in creating software
  for desktop platforms, mobile development, and hardware.
baseurl: ""
url: "http://banikaz.online"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Permalink settings for clean URLs
permalink: /:categories/:year/:month/:day/:title.html

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  projects:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "v2-post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"